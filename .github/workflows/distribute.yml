# When a post lands in src/content/posts/, wait for Cloudflare deploy so the
# OG card is live, then run scripts/announce.mjs (Bluesky when secrets exist;
# always prints paste-ready X/Threads text in the job log).
#
# Agent publishes often land many commits in a burst — concurrency queues them
# so we don't stampede Bluesky or send a wall of failure emails on OG lag.
#
# Manual test: Actions → Distribute → Run workflow
# Secrets: SITE_URL, BSKY_HANDLE, BSKY_APP_PASSWORD, ANNOUNCE_DRY_RUN
name: Distribute

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**"
  workflow_dispatch:
    inputs:
      post:
        description: "Post path to announce (e.g. src/content/posts/2026-07-14-example.md)"
        required: true
        type: string
      dry_run:
        description: "Dry run (print only; do not post to Bluesky)"
        required: true
        type: boolean
        default: true

# One announce at a time. New publishes wait their turn (do not cancel mid-flight).
concurrency:
  group: clad-distribute
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    # Retries inside announce.mjs can wait several minutes for OG after deploy.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: List changed posts
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files="${{ inputs.post }}"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$files" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "count=1" >> "$GITHUB_OUTPUT"
            echo "Manual announce: $files"
            exit 0
          fi
          files=$(git diff --name-only HEAD~1 HEAD -- 'src/content/posts/**' | grep '\.md$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          count=$(printf '%s\n' "$files" | grep -c . || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Changed posts ($count):"
          printf '%s\n' "$files"

      - name: Wait for Workers deploy (initial)
        if: steps.diff.outputs.count != '0' && github.event_name != 'workflow_dispatch'
        run: |
          # Base wait; announce.mjs also retries OG for several more minutes.
          sleep 120

      - name: Check Bluesky secrets (names only)
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: |
          if [ -n "${BSKY_HANDLE:-}" ]; then
            echo "BSKY_HANDLE: set (${#BSKY_HANDLE} chars)"
          else
            echo "BSKY_HANDLE: MISSING"
          fi
          if [ -n "${BSKY_APP_PASSWORD:-}" ]; then
            echo "BSKY_APP_PASSWORD: set (${#BSKY_APP_PASSWORD} chars)"
          else
            echo "BSKY_APP_PASSWORD: MISSING"
          fi

      - name: Announce
        if: steps.diff.outputs.count != '0'
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          DRY_RUN: ${{ secrets.ANNOUNCE_DRY_RUN }}
        run: |
          set -euo pipefail
          export SITE_URL="${SITE_URL:-https://cladfacts.com}"
          files="${{ steps.diff.outputs.files }}"
          if [ -z "${files// }" ]; then
            echo "No markdown posts in this push."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              export DRY_RUN=1
              echo "workflow_dispatch: dry_run=true"
            else
              unset DRY_RUN || true
              export DRY_RUN=0
              echo "workflow_dispatch: LIVE post to Bluesky"
            fi
          fi

          if [ -z "${BSKY_HANDLE:-}" ] || [ -z "${BSKY_APP_PASSWORD:-}" ]; then
            export DRY_RUN=1
            echo "BSKY secrets missing — dry-run print only."
          else
            echo "BSKY secrets present."
          fi

          # shellcheck disable=SC2086
          node scripts/announce.mjs $files
